<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App DevQuiz</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app-container">
      <!-- Contenue de l'application-->
      <section id="accueil" class="screen">
        <!-- Ecran de demarrage -->
        <div class="icon">🧠</div>
        <h1>DevQuiz</h1>
        <h2>Teste tes skills JS</h2>
        <div id="start-button">
          <button class="start">Commencer</button>
        </div>
      </section>

      <section id="question" class="screen">
        <!-- Ecran des questions -->
        <div id="compeur-question">
          <p>Question</p>
          <p><span class="index-color"></span> / <span class="QuestionNbr"></span></p>
        </div>

        <div id="question-screen">
          <p class="question"></p>
        </div>

        <div id="response-button">
          <div class="button">
            <div class="choice-icon">1️⃣</div>
            <p class="reponse one"></p>
          </div>
          <div class="button">
            <div class="choice-icon">2️⃣</div>
            <p class="reponse two"></p>
          </div>
          <div class="button">
            <div class="choice-icon">3️⃣</div>
            <p class="reponse three"></p>
          </div>
          <div class="button">
            <div class="choice-icon">4️⃣</div>
            <p class="reponse four"></p>
          </div>
        </div>
      </section>

      <section id="feedback" class="screen">
        <!-- Ecran de feedback -->
        <div class="feedback-icon"></div>
        <h3 class="message"></h3>
        <h3 class="feedback-reponse"></h3>
        <p class="explication"></p>
        <div id="next-button">
          <button class="next-question-button">Question suivante</button>
        </div>
      </section>

      <section id="resultat" class="screen">
        <div id="score-section">
          <p class="score-text">Score</p>
          <p class="note"></p>
          <div id="congratulation">
            <p class="mention">
              🎉 <br />
              Félicitations
            </p>
            <p class="observation">Bon développeur !</p>
          </div>
        </div>
        <div id="button-reset">
          <button class="reset">Rejouer</button>
        </div>
      </section>
    </div>

    <script type="module" src="app.js"></script>
    <script src="question.js"></script>
  </body>
</html>
