<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App DevQuiz</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app-container">
      <!-- Contenue de l'application-->
      <section id="accueil">
        <!-- Ecran de demarrage -->
        <div class="icon">🧠</div>
        <h1>DevQuiz</h1>
        <h2>Teste tes skills JS</h2>
        <div id="start-button">
          <button class="start">Commencer</button>
        </div>
      </section>

      <section id="question">
        <!-- Ecran des questions -->
        <div id="compeur-question">
          <p>Question</p>
          <p><span class="index-color">1</span> / 3</p>
        </div>

        <div id="question-screen">
          <p class="question">Que retourne typeof null en JS ?</p>
        </div>

        <div id="response-button">
          <div class="button">
            <div class="choice-icon">1️⃣</div>
            <p class="reponse">null</p>
          </div>
          <div class="button">
            <div class="choice-icon">2️⃣</div>
            <p class="reponse">undefined</p>
          </div>
          <div class="button">
            <div class="choice-icon">3️⃣</div>
            <p class="reponse">object</p>
          </div>
          <div class="button">
            <div class="choice-icon">4️⃣</div>
            <p class="reponse">string</p>
          </div>
        </div>
      </section>

      <section id="feedback">
        <!-- Ecran de feedback -->
          <div class="icon">😀</div>
        <h3 class="res-question">✅ Bonne réponse !</h3>
        <p class="explication">💡 C'est un bug historique de JS...</p>
        <div id="next-button">
          <button class="next-question-button">Question suivante</button>
        </div>
      </section>

      <section id="resultat">
        <div id="score-section">
          <p class="score-text">Score</p>
          <p class="note">2 / 3</p>
          <div id="congratulation">
            <p>🎉 <br> Félicitations</p>
            <p>Bon développeur !</p>
          </div>
        </div>
        <div id="button-reset">
          <button class="reset">Rejouer</button>
        </div>
      </section>
    </div>

    <script src="app.js"></script>
    <script src="question.js"></script>
  </body>
</html>
